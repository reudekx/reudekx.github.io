{%- assign parts = include.content | split: '<a href="https://' -%}

{%- capture output -%}
  {{ parts[0] }}
  {%- if parts.size > 1 -%}
    {%- for part in parts | offset: 1 -%}
      <a target="_blank" rel="noopener noreferrer" href="https://{{ part }}
    {%- endfor -%}
  {%- endif -%}
{%- endcapture -%}

{{ output }}
