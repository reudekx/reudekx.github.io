<header>
  <div class="container">
    <nav class="navigation">
      {%- for item in site.data.navigation -%}
        <a href="{{ item.link }}" {% if page.url == item.link %}style="color: red;"{% endif %}>
          {{ item.name }}
        </a>
      {%- endfor -%}
    </nav>
    <form class="search">
      <input type="search">
      <button>검색</button>
    </form>
  </div>
</header>
